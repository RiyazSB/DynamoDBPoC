spring.application.name=DynamoDBPOC

# AWS DynamoDB configuration
# Profile name from ~/.aws/credentials (leave empty in AWS - uses instance role)
aws.dynamodb.profile=dynamo_local_dev
aws.dynamodb.region=us-east-1
aws.dynamodb.table-name=records
aws.dynamodb.auto-create-table=true
# Example for DynamoDB Local: http://localhost:8000
aws.dynamodb.endpoint=

# Swagger/OpenAPI docs
springdoc.swagger-ui.path=/swagger-ui

# Request/Response body logging (set false to disable)
app.logging.requests.enabled=true

