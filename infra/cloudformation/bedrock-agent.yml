AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create base Amazon Bedrock Agent resources for DynamoDB Records API'

Parameters:
  APIGatewayEndpoint:
    Type: String
    Description: 'Your API Gateway endpoint URL (e.g., https://xxxxx.execute-api.us-east-1.amazonaws.com/prod)'
    AllowedPattern: '^https://[a-z0-9]+\.execute-api\.[a-z0-9-]+\.amazonaws\.com/[a-z0-9]+$'
    ConstraintDescription: 'Must be a valid API Gateway endpoint URL'

  AgentName:
    Type: String
    Default: 'DynamoDBRecordsAgent'
    Description: 'Name of the Bedrock Agent'

  FoundationModel:
    Type: String
    Default: 'amazon.nova-micro-v1:0'
    Description: 'Foundation model for the agent (Amazon Nova Micro - no access gating required)'

Resources:
  # IAM Role for Bedrock Agent
  BedrockAgentRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'bedrock.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/CloudWatchLogsFullAccess'
      Policies:
        - PolicyName: 'BedrockAgentAPIPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource:
                  - 'arn:aws:bedrock:*::foundation-model/*'
                  - 'arn:aws:bedrock:*:*:inference-profile/*'
              - Effect: Allow
                Action:
                  - 'execute-api:Invoke'
                Resource: 'arn:aws:execute-api:*:*:*/*'
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: 'arn:aws:logs:*:*:*'

  # CloudWatch Log Group for Agent
  BedrockAgentLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/bedrock/agent/${AWS::StackName}'
      RetentionInDays: 30

  # Bedrock Agent
  DynamoDBRecordsAgent:
    Type: 'AWS::Bedrock::Agent'
    DependsOn: BedrockAgentRole
    Properties:
      AgentName: !Ref AgentName
      Description: 'AI Agent for managing DynamoDB records via REST API using natural language'
      FoundationModel: !Ref FoundationModel
      IdleSessionTTLInSeconds: 900
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      Instruction: |
        You are a helpful AI assistant that manages records in a DynamoDB database through REST API calls.
        
        Your capabilities:
        - Create new records with custom data
        - List all existing records
        - Retrieve specific records by ID
        - Update existing records with new data
        - Delete records
        
        When users ask you to perform actions on records, use the available API endpoints to fulfill their requests.
        Always provide clear feedback about what you're doing and the results of API calls.
        If a record ID is needed but not provided, ask the user for it.
        Be conversational and helpful in your responses.

  # Lambda Function for API Invocation
  APIInvocationLambda:
    Type: 'AWS::Lambda::Function'
    Properties:
      Runtime: 'python3.11'
      Handler: 'index.lambda_handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Environment:
        Variables:
          API_ENDPOINT: !Ref APIGatewayEndpoint
      Code:
        ZipFile: |
          import json
          import os
          from urllib.parse import urlencode
          import urllib3

          http = urllib3.PoolManager()

          def _extract_json_body(request_body):
              if not request_body:
                  return None
              if isinstance(request_body, dict) and "content" not in request_body:
                  return request_body
              content = request_body.get("content", {}) if isinstance(request_body, dict) else {}
              app_json = content.get("application/json", {})
              props = app_json.get("properties", [])
              if isinstance(props, list):
                  out = {}
                  for p in props:
                      name = p.get("name")
                      value = p.get("value")
                      if name is not None:
                          out[name] = value
                  return out if out else None
              return None

          def _substitute_path_params(api_path, parameters):
              if not parameters or not api_path:
                  return api_path, parameters or []
              remaining = []
              for p in parameters:
                  name = p.get("name", "")
                  value = p.get("value", "")
                  placeholder = "{" + name + "}"
                  if placeholder in api_path:
                      api_path = api_path.replace(placeholder, str(value))
                  else:
                      remaining.append(p)
              return api_path, remaining

          def _extract_query_params(parameters):
              if not parameters:
                  return {}
              result = {}
              for p in parameters:
                  name = p.get("name")
                  value = p.get("value")
                  if name and value is not None:
                      result[name] = value
              return result

          def lambda_handler(event, context):
              original_api_path = event.get("apiPath", "")
              original_http_method = event.get("httpMethod", "GET")
              action_group = event.get("actionGroup", "")
              try:
                  api_endpoint = os.environ["API_ENDPOINT"].rstrip("/")
                  http_method = (original_http_method or "GET").upper()
                  parameters = event.get("parameters") or []
                  resolved_path, remaining_params = _substitute_path_params(original_api_path, parameters)
                  query_params = _extract_query_params(remaining_params)
                  body_obj = _extract_json_body(event.get("requestBody"))
                  url = api_endpoint + resolved_path
                  if query_params:
                      url = url + "?" + urlencode(query_params)
                  headers = {"Content-Type": "application/json"}
                  print("Calling: " + http_method + " " + url)
                  if http_method in ("POST", "PUT", "PATCH"):
                      body_bytes = json.dumps(body_obj or {}).encode("utf-8")
                      resp = http.request(http_method, url, body=body_bytes, headers=headers)
                  else:
                      resp = http.request(http_method, url, headers=headers)
                  response_body = resp.data.decode("utf-8") if resp.data else "{}"
                  return {
                      "messageVersion": "1.0",
                      "response": {
                          "actionGroup": action_group,
                          "apiPath": original_api_path,
                          "httpMethod": http_method,
                          "httpStatusCode": int(resp.status),
                          "responseBody": {"application/json": {"body": response_body}}
                      }
                  }
              except Exception as e:
                  import traceback
                  traceback.print_exc()
                  return {
                      "messageVersion": "1.0",
                      "response": {
                          "actionGroup": action_group,
                          "apiPath": original_api_path,
                          "httpMethod": original_http_method,
                          "httpStatusCode": 500,
                          "responseBody": {"application/json": {"body": json.dumps({"error": str(e)})}}
                      }
                  }

  # Allows Bedrock to invoke the Lambda executor later via action group setup
  BedrockInvokeLambdaPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !Ref APIInvocationLambda
      Action: 'lambda:InvokeFunction'
      Principal: 'bedrock.amazonaws.com'

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'lambda.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'AllowAPIInvocation'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'execute-api:Invoke'
                Resource: 'arn:aws:execute-api:*:*:*/*'

Outputs:
  AgentId:
    Description: 'Bedrock Agent ID'
    Value: !Ref DynamoDBRecordsAgent
    Export:
      Name: !Sub '${AWS::StackName}-AgentId'

  BedrockAgentRoleArn:
    Description: 'ARN of the Bedrock Agent IAM Role'
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  LambdaFunctionArn:
    Description: 'ARN of the Lambda function for API invocation'
    Value: !GetAtt APIInvocationLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'

  LogGroupName:
    Description: 'CloudWatch Log Group for Agent'
    Value: !Ref BedrockAgentLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroup'


