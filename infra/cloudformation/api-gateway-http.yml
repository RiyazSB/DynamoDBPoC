AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Minimal API Gateway HTTP API for DynamoDBPOC.
  Proxies requests to the EC2 app on port 8080.

Parameters:
  EC2PublicIP:
    Type: String
    Description: EC2 public IP address (e.g., 54.123.45.67)
  ApiName:
    Type: String
    Default: dynamodbpoc-http-api

Resources:
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiName
      ProtocolType: HTTP

  HttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      IntegrationUri: !Sub 'http://${EC2PublicIP}:8080'
      PayloadFormatVersion: '1.0'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpIntegration}'

  HttpStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: prod
      AutoDeploy: true

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  SwaggerUrl:
    Description: Swagger UI via API Gateway
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/swagger-ui/index.html'
  SwaggerDirectUrl:
    Description: Swagger UI direct on EC2 (fallback)
    Value: !Sub 'http://${EC2PublicIP}:8080/swagger-ui/index.html'

