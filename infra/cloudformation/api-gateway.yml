AWSTemplateFormatVersion: '2010-09-09'
Description: >
  API Gateway + CloudWatch Logs for DynamoDBPOC.
  Forwards traffic to existing EC2 instance (public IP) and logs all requests/responses.

Parameters:
  EC2PublicIP:
    Type: String
    Description: EC2 instance public IP address (e.g., 54.xxx.xxx.xxx). Find in EC2 console.
  ApiName:
    Type: String
    Default: dynamodbpoc-api
    Description: Name for the API Gateway

Resources:

  # ── CloudWatch Log Group for API Gateway ──────────────────────────────────
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${ApiName}'
      RetentionInDays: 7

  # ── IAM Role for API Gateway to write logs ────────────────────────────────
  ApiGatewayLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: '*'

  # ── API Gateway Account (enables logging globally) ────────────────────────
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayLogsRole.Arn

  # ── API Gateway REST API ──────────────────────────────────────────────────
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: DynamoDBPOC API Gateway with CloudWatch Logs

  # ── Proxy resource (catches all paths) ─────────────────────────────────────
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: '{proxy+}'

  # ── Proxy method (GET, POST, PUT, DELETE, etc.) ──────────────────────────
  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Type: HTTP_PROXY
      Integration:
        IntegrationHttpMethod: POST
        Type: HTTP_PROXY
        Uri: !Sub 'http://${EC2PublicIP}:8080/{proxy}'
      MethodResponses:
        - StatusCode: 200

  # ── Root method proxy (for / path) ────────────────────────────────────────
  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Type: HTTP_PROXY
      Integration:
        IntegrationHttpMethod: POST
        Type: HTTP_PROXY
        Uri: !Sub 'http://${EC2PublicIP}:8080/'
      MethodResponses:
        - StatusCode: 200

  # ── Deployment ────────────────────────────────────────────────────────────
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ProxyMethod
      - RootMethod
    Properties:
      RestApiId: !Ref RestApi
      StageName: prod

  # ── Stage with logging ────────────────────────────────────────────────────
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      LoggingLevel: INFO
      DataTraceEnabled: true
      CloudWatchMetricsEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  SwaggerUrl:
    Description: Swagger UI through API Gateway
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/swagger-ui'
  CloudWatchLogGroup:
    Description: CloudWatch log group name for API requests
    Value: !Ref ApiLogGroup
  LogViewUrl:
    Description: CloudWatch Logs console link
    Value: !Sub 'https://console.aws.amazon.com/logs/log-groups/${ApiLogGroup}'

